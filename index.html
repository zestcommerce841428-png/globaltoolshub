    <link rel="canonical" href="https://zestcommerce841428-png.github.io/globaltoolshub/">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/styles.css?v=2">

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GlobalToolsHub",
        "url": "https://zestcommerce841428-png.github.io/globaltoolshub/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web Browser",
        "isAccessibleForFree": true,
        "description": "A unified searchable hub for 390+ merged online tools covering development, images, PDFs, text, crypto, finance, and utilities.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "provider": { "@type": "Organization", "name": "GlobalToolsHub" },
        "browserRequirements": "Requires JavaScript",
        "softwareVersion": "2.0"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GlobalToolsHub",
        "url": "https://zestcommerce841428-png.github.io/globaltoolshub/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://zestcommerce841428-png.github.io/globaltoolshub/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://zestcommerce841428-png.github.io/globaltoolshub/" }

    <!-- SEO Runtime (GTAG + Dynamic SEO + Accessibility Widget) -->
    <script src="assets/seo-runtime.js" defer></script>
  <script src="assets/components.js?v=2" defer></script>
</head>
  <body data-bg="clean">
    <!-- Skip to content link for keyboard users -->
    <a href="#catalog" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-indigo-600 focus:px-4 focus:py-2 focus:text-white">Skip to main content</a>

    <global-header></global-header>

    <main role="main">
      <section class="shell py-8 sm:py-10 lg:py-14" aria-label="Welcome">
        <div class="grid gap-6 sm:gap-8 lg:grid-cols-[1fr_360px] lg:items-end">
          <div>
            <div id="countryNotice" class="mb-4 inline-flex items-center gap-2 rounded-full border border-teal-500/30 bg-teal-500/10 px-3 py-1 text-sm font-medium text-teal-700 dark:text-teal-200">
              <span class="h-2 w-2 rounded-full bg-teal-500"></span>
              Global tool catalog
            </div>
            <h1 class="max-w-4xl text-3xl font-black tracking-normal sm:text-4xl md:text-5xl lg:text-6xl">GlobalToolsHub</h1>
            <p id="subtitle" class="mt-3 max-w-3xl text-base leading-7 text-slate-600 sm:mt-4 sm:text-lg sm:leading-8 dark:text-slate-300">
              A unified, searchable hub for developer, image, PDF, text, crypto, finance, and utility tools.
            </p>
          </div>
          <div class="surface grid grid-cols-3 gap-3 rounded-lg p-4">
            <div>
              <div id="statTools" class="text-2xl font-black sm:text-3xl">0</div>
              <div class="text-xs font-medium uppercase tracking-wide text-slate-500">Tools</div>
            </div>
            <div>
              <div id="statCategories" class="text-2xl font-black sm:text-3xl">0</div>
              <div class="text-xs font-medium uppercase tracking-wide text-slate-500">Categories</div>
            </div>
            <div>
              <div id="statSources" class="text-2xl font-black sm:text-3xl">0</div>
              <div class="text-xs font-medium uppercase tracking-wide text-slate-500">Sources</div>
            </div>
          </div>
        </div>
      </section>

      <section id="catalog" class="shell pb-10 sm:pb-12" aria-label="Tool catalog">
        <div class="surface rounded-lg p-3 sm:p-4 md:p-5">
          <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-[1fr_180px_180px_150px]">
            <input id="searchInput" class="control" type="search" autocomplete="off" placeholder="Search tools, formats, tasks, or sources" aria-label="Search tools">
            <select id="categoryFilter" class="control" aria-label="Filter by category"></select>
            <select id="sourceFilter" class="control" aria-label="Filter by source"></select>
            <select id="bgSelect" class="control" aria-label="Background style">
              <option value="clean">Clean</option>
              <option value="mesh">Focus</option>
              <option value="paper">Grid</option>
            </select>
          </div>
          <div class="mt-3 flex flex-wrap items-center justify-between gap-3 sm:mt-4">
            <p id="resultCount" class="text-sm font-semibold text-slate-600 dark:text-slate-300">0 tools</p>
            <div class="flex items-center gap-2">
              <select id="pageSize" class="control w-20 sm:w-24" aria-label="Tools per page">
                <option value="12">12</option>
                <option value="24" selected>24</option>
                <option value="48">48</option>
              </select>
              <button id="gridView" class="icon-button" type="button" aria-label="Grid view" title="Grid view" aria-pressed="true">Grid</button>
              <button id="listView" class="icon-button" type="button" aria-label="List view" title="List view" aria-pressed="false">List</button>
            </div>
          </div>
        </div>

        <div id="toolsGrid" class="mt-4 grid gap-3 sm:mt-5 sm:gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
        <nav id="pagination" class="mt-5 flex flex-wrap justify-center gap-2 sm:mt-6" aria-label="Tool catalog pagination"></nav>
      </section>
    </main>

    <global-footer></global-footer>

    <script src="assets/app.js?v=2" defer></script>
  </body>
</html>
