<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sitemap - GlobalToolsHub</title>
    <meta name="description" content="Complete sitemap of GlobalToolsHub - Browse all 387+ tools, 400+ blogs, and pages.">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css?v=2">
    <link rel="stylesheet" href="assets/site.css?v=2">
    <script src="assets/components.js?v=2" defer></script>
    <script src="assets/seo-runtime.js" defer></script>
</head>
<body data-bg="clean">
    
    <global-header></global-header>

    <main class="shell py-8 sm:py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-black sm:text-4xl">Sitemap</h1>
            <p class="mt-2 text-slate-600 dark:text-slate-300">Complete navigation of all tools, blogs, and pages.</p>
        </div>

        <!-- Search -->
        <div class="surface mb-6 rounded-lg p-4">
            <input 
                type="search" 
                id="sitemapSearch" 
                class="control w-full" 
                placeholder="Search sitemap..."
                aria-label="Search sitemap">
        </div>

        <!-- Main Pages -->
        <section class="mb-8">
            <h2 class="mb-4 text-2xl font-bold text-indigo-600 dark:text-indigo-400">📄 Main Pages</h2>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                <a href="index.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg hover:scale-105">
                    <div class="mb-2 text-3xl">🏠</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Home</div>
                    <div class="text-sm text-slate-600 dark:text-slate-400">387+ Tools</div>
                </a>
                <a href="blog.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg hover:scale-105">
                    <div class="mb-2 text-3xl">📝</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Blog</div>
                    <div class="text-sm text-slate-600 dark:text-slate-400">400+ Posts</div>
                </a>
                <a href="about.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg hover:scale-105">
                    <div class="mb-2 text-3xl">ℹ️</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">About</div>
                    <div class="text-sm text-slate-600 dark:text-slate-400">Our Mission</div>
                </a>
                <a href="contact.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg hover:scale-105">
                    <div class="mb-2 text-3xl">📧</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Contact</div>
                    <div class="text-sm text-slate-600 dark:text-slate-400">Get in Touch</div>
                </a>
            </div>
        </section>

        <!-- Tool Categories -->
        <section class="mb-8">
            <h2 class="mb-4 text-2xl font-bold text-indigo-600 dark:text-indigo-400">🛠️ Tool Categories</h2>
            <div id="toolCategories" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                <!-- Will be populated by JavaScript -->
            </div>
        </section>

        <!-- All Tools -->
        <section class="mb-8">
            <h2 class="mb-4 text-2xl font-bold text-indigo-600 dark:text-indigo-400">🔧 All Tools (387)</h2>
            <div id="toolsList" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                <!-- Will be populated by JavaScript -->
            </div>
        </section>

        <!-- Legal Pages -->
        <section class="mb-8">
            <h2 class="mb-4 text-2xl font-bold text-indigo-600 dark:text-indigo-400">⚖️ Legal & Info</h2>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                <a href="privacy.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg">
                    <div class="mb-2 text-2xl">🔒</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Privacy Policy</div>
                </a>
                <a href="terms.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg">
                    <div class="mb-2 text-2xl">📜</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Terms of Service</div>
                </a>
                <a href="accessibility.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg">
                    <div class="mb-2 text-2xl">♿</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Accessibility</div>
                </a>
                <a href="disclaimer.html" class="group surface rounded-lg p-4 transition-all hover:shadow-lg">
                    <div class="mb-2 text-2xl">⚠️</div>
                    <div class="font-semibold group-hover:text-indigo-600 dark:group-hover:text-indigo-400">Disclaimer</div>
                </a>
            </div>
        </section>

    </main>

    <global-footer></global-footer>

    <script>
        let allTools = [];
        let allCategories = {};

        async function init() {
            try {
                // Load tools data
                const response = await fetch('assets/tools.json');
                allTools = await response.json();
                
                // Group by category
                allTools.forEach(tool => {
                    const cat = tool.category || 'Other';
                    if (!allCategories[cat]) {
                        allCategories[cat] = [];
                    }
                    allCategories[cat].push(tool);
                });

                renderCategories();
                renderTools();
                bindSearch();
            } catch (error) {
                console.error('Failed to load tools:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('toolCategories');
            const categoryIcons = {
                'Encoding & Decoding': '🔐',
                'Text Processing': '📝',
                'Development': '💻',
                'SEO & Marketing': '📊',
                'Utilities': '🔧',
                'Generators': '✨',
                'Calculators': '🧮',
                'Security': '🛡️'
            };

            Object.keys(allCategories).sort().forEach(category => {
                const icon = categoryIcons[category] || '📦';
                const count = allCategories[category].length;
                
                const card = document.createElement('div');
                card.className = 'surface rounded-lg p-6 hover:shadow-lg transition-all cursor-pointer';
                card.onclick = () => scrollToCategory(category);
                card.innerHTML = `
                    <div class="mb-2 text-3xl">${icon}</div>
                    <div class="font-bold text-lg mb-1">${category}</div>
                    <div class="text-sm text-slate-600 dark:text-slate-400">${count} tools</div>
                `;
                container.appendChild(card);
            });
        }

        function renderTools(filter = '') {
            const container = document.getElementById('toolsList');
            container.innerHTML = '';

            const filtered = filter 
                ? allTools.filter(t => t.name.toLowerCase().includes(filter.toLowerCase()))
                : allTools;

            filtered.forEach(tool => {
                const link = document.createElement('a');
                link.href = tool.url;
                link.className = 'surface rounded-lg p-3 hover:shadow-md hover:border-indigo-300 dark:hover:border-indigo-700 transition-all text-sm';
                link.innerHTML = `
                    <div class="font-medium text-slate-900 dark:text-slate-100">${escapeHtml(tool.name)}</div>
                    <div class="text-xs text-slate-600 dark:text-slate-400 mt-1">${escapeHtml(tool.category || 'Tool')}</div>
                `;
                container.appendChild(link);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-slate-600 dark:text-slate-400 py-8">No tools found</p>';
            }
        }

        function bindSearch() {
            document.getElementById('sitemapSearch').addEventListener('input', (e) => {
                renderTools(e.target.value);
            });
        }

        function scrollToCategory(category) {
            renderTools();
            // Optionally scroll to tools section
            document.getElementById('toolsList').scrollIntoView({ behavior: 'smooth' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>

</body>
</html>
