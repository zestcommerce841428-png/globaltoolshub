<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Line Counter - GlobalToolsHub</title>
    <meta name="description" content="Count the number of lines in a text block.">
    <link rel="stylesheet" href="../../../assets/styles.css?v=2">
    <link rel="stylesheet" href="../../../assets/site.css?v=2">
    <script src="../../../assets/components.js?v=2" defer></script>
    <script src="../../../assets/seo-runtime.js" defer></script>
    <script src="../../../assets/app.js?v=2" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Line Counter</h1>
      <p>Count the number of lines in a text block.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="space-y-4">
        <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-4 rounded-lg">
          <span class="text-lg font-bold">Total Lines:</span>
          <span id="count" class="text-2xl font-black text-indigo-600">0</span>
        </div>
        <textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" placeholder="Paste text here..." oninput="document.getElementById('count').textContent = this.value ? this.value.split('\n').length : 0"></textarea>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function process() { document.getElementById('output').value = document.getElementById('input').value; }
    
    </script>
  </body>
</html>
