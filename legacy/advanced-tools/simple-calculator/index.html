      <h1>Simple Calculator</h1>
      <p>A basic standard calculator.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-xs mx-auto surface p-6 rounded-xl border border-slate-200 shadow-lg dark:border-slate-800">
        <input type="text" id="calc-display" class="w-full bg-slate-100 dark:bg-slate-900 text-right p-4 text-2xl font-mono rounded-lg mb-4 outline-none" readonly value="0">
        <div class="grid grid-cols-4 gap-2">
          <button class="btn btn-secondary col-span-2" onclick="process()">C</button>
          <button class="btn btn-secondary" onclick="process()">/</button>
          <button class="btn btn-secondary" onclick="process()">×</button>

          <button class="btn btn-default" onclick="process()">8</button>
          <button class="btn btn-default" onclick="process()">9</button>
          <button class="btn btn-secondary" onclick="process()">-</button>
          <button class="btn btn-default" onclick="process()">4</button>
          <button class="btn btn-default" onclick="process()">5</button>
          <button class="btn btn-default" onclick="process()">6</button>
          <button class="btn btn-secondary" onclick="process()">+</button>
          <button class="btn btn-default" onclick="process()">1</button>
          <button class="btn btn-default" onclick="process()">2</button>
          <button class="btn btn-default" onclick="process()">3</button>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 row-span-2" onclick="process()">=</button>
          <button class="btn btn-default col-span-2" onclick="process()">0</button>
          <button class="btn btn-default" onclick="process()">.</button>

      </div>

    <script>
      
      let disp = '0', op = null, prev = null;
      const d = document.getElementById('calc-display');
      function calcNum(n) { disp = disp === '0' ? String(n) : disp + n; d.value = disp; }
      function calcOp(o) { prev = disp; op = o; disp = '0'; }
      function calcEq() { if(op && prev){ disp = String(eval(prev + op + disp)); op=null; prev=null; d.value = disp; } }
      function calcClear() { disp = '0'; op = null; prev = null; d.value = disp; }
    
    </script>
  <script>

function process() {
  const expr = document.getElementById('input').value;
  try {
    const result = Function('"use strict"; return (' + expr + ')')();
    document.getElementById('output').value = result;
  } catch(e) {
    alert('Invalid expression: ' + e.message);
  }
}
</script>
