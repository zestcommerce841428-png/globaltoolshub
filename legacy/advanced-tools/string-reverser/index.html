<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>String Reverser - GlobalToolsHub</title>
    <meta name="description" content="Reverse any text string backwards.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>String Reverser</h1>
      <p>Reverse any text string backwards.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-48" placeholder="Type here..." oninput="output.value=this.value.split('').reverse().join('')"></textarea>
        <textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-48" readonly></textarea>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
    </script>
  </body>
</html>
