<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unix Timestamp Converter - GlobalToolsHub</title>
    <meta name="description" content="Convert Unix epoch timestamps to human-readable dates and vice versa.">
    <link rel="stylesheet" href="../../../assets/styles.css?v=2">
    <link rel="stylesheet" href="../../../assets/site.css?v=2">
    <script src="../../../assets/components.js?v=2" defer></script>
    <script src="../../../assets/seo-runtime.js" defer></script>
    <script src="../../../assets/app.js?v=2" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Unix Timestamp Converter</h1>
      <p>Convert Unix epoch timestamps to human-readable dates and vice versa.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <h3 class="font-bold text-lg">Timestamp to Date</h3>
          <input type="number" id="ts" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono" placeholder="1717000000">
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 w-full" onclick="res1.value=new Date(ts.value*1000).toLocaleString()">Convert</button>
          <input type="text" id="res1" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" readonly>
        </div>
        <div class="space-y-4">
          <h3 class="font-bold text-lg">Date to Timestamp</h3>
          <input type="datetime-local" id="dt" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner">
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 w-full" onclick="res2.value=Math.floor(new Date(dt.value).getTime()/1000)">Convert</button>
          <input type="text" id="res2" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono" readonly>
        </div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      document.getElementById('ts').value = Math.floor(Date.now()/1000);
    
    </script>
  </body>
</html>
