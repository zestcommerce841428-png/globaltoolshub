<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Decimal to Binary Converter - GlobalToolsHub</title>
    <meta name="description" content="Convert decimal numbers to binary.">
    <link rel="stylesheet" href="../../../assets/styles.css?v=2">
    <link rel="stylesheet" href="../../../assets/site.css?v=2">
    <script src="../../../assets/components.js?v=2" defer></script>
    <script src="../../../assets/seo-runtime.js" defer></script>
    <script src="../../../assets/app.js?v=2" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Decimal to Binary Converter</h1>
      <p>Convert decimal numbers to binary.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-2">Decimal</label><input type="number" id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" placeholder="42"></div>
        <div>
          <label class="block text-sm font-medium mb-2">Binary</label><input type="text" id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono" readonly>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="document.getElementById('output').value=parseInt(document.getElementById('input').value,10).toString(2)">Convert</button>
        </div>
      </div>
    
      </div>
    </main>
