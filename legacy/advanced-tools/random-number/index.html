<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Number Generator - GlobalToolsHub</title>
    <meta name="description" content="Generate random numbers between a minimum and maximum range.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Random Number Generator</h1>
      <p>Generate random numbers between a minimum and maximum range.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-md mx-auto space-y-4 surface p-6 rounded-xl border border-slate-200">
        <div class="flex gap-4">
          <div class="flex-1"><label class="block text-sm mb-1">Min</label><input type="number" id="min" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" value="1"></div>
          <div class="flex-1"><label class="block text-sm mb-1">Max</label><input type="number" id="max" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" value="100"></div>
        </div>
        <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 w-full" onclick="gen()">Generate</button>
        <div id="res" class="text-center text-4xl font-black py-4"></div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function gen() {
        const min = parseInt(document.getElementById('min').value);
        const max = parseInt(document.getElementById('max').value);
        document.getElementById('res').textContent = Math.floor(Math.random() * (max - min + 1)) + min;
      }
      gen();
    
    </script>
  </body>
</html>
