  <body data-bg="clean">

      <h1>Random Number Generator</h1>
      <p>Generate random numbers between a minimum and maximum range.</p>

          <div class="flex-1"><label class="block text-sm mb-1">Min</label><input type="number" id="min" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" value="1"></div>

      </div>

    <script>

function process() {
  const min = parseInt(document.getElementById('min')?.value || 1);
  const max = parseInt(document.getElementById('max')?.value || 100);
  const count = parseInt(document.getElementById('count')?.value || 1);
  const results = [];
  for(let i=0; i<count; i++) {
    results.push(Math.floor(Math.random() * (max - min + 1)) + min);
  }
  document.getElementById('output').value = results.join('\n');
}
    </script>
