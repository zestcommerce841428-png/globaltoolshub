<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text Case Converter - GlobalToolsHub</title>
    <meta name="description" content="Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, and more.">
    <link rel="stylesheet" href="../../../assets/styles.css?v=2">
    <link rel="stylesheet" href="../../../assets/site.css?v=2">
    <script src="../../../assets/components.js?v=2" defer></script>
    <script src="../../../assets/seo-runtime.js" defer></script>
    <script src="../../../assets/app.js?v=2" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Text Case Converter</h1>
      <p>Convert text between UPPERCASE, lowercase, Title Case, camelCase, snake_case, and more.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-2">Input Text</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" placeholder="Enter text here..."></textarea></div>
        <div>
          <label class="block text-sm font-medium mb-2">Output</label><textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" readonly></textarea>
          <div class="mt-4 flex flex-wrap gap-2">
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('upper')">UPPERCASE</button>
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('lower')">lowercase</button>
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('title')">Title Case</button>
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('camel')">camelCase</button>
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('snake')">snake_case</button>
            <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95" onclick="convert('kebab')">kebab-case</button>
          </div>
        </div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function convert(type) {
        const str = document.getElementById('input').value;
        let res = '';
        if(type==='upper') res = str.toUpperCase();
        if(type==='lower') res = str.toLowerCase();
        if(type==='title') res = str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.substr(1).toLowerCase());
        if(type==='camel') res = str.replace(/(?:^\w|[A-Z]|\b\w)/g, (w, i) => i === 0 ? w.toLowerCase() : w.toUpperCase()).replace(/\s+/g, '');
        if(type==='snake') res = str.replace(/\W+/g, ' ').split(/ |\B(?=[A-Z])/).map(w => w.toLowerCase()).join('_');
        if(type==='kebab') res = str.replace(/\W+/g, ' ').split(/ |\B(?=[A-Z])/).map(w => w.toLowerCase()).join('-');
        document.getElementById('output').value = res;
      }
    
    </script>
  </body>
</html>
