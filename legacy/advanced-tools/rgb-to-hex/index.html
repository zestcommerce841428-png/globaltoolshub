  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>RGB to HEX</h1>
      <p>Convert RGB color codes to Hex.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-sm mx-auto space-y-4 text-center">
        <div class="flex gap-2">
          <input type="number" id="r" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner text-center" placeholder="R" value="79" min="0" max="255" oninput="conv()">
          <input type="number" id="g" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner text-center" placeholder="G" value="70" min="0" max="255" oninput="conv()">
          <input type="number" id="b" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner text-center" placeholder="B" value="229" min="0" max="255" oninput="conv()">
        </div>
        <div id="preview" class="w-24 h-24 mx-auto rounded-lg" style="background: rgb(79,70,229)"></div>
        <input type="text" id="hex" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono text-center uppercase" readonly>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function conv() {
        const r = parseInt(document.getElementById('r').value)||0;
        const g = parseInt(document.getElementById('g').value)||0;
        const b = parseInt(document.getElementById('b').value)||0;
        const hex = "#" + (1<<24 | r<<16 | g<<8 | b).toString(16).slice(1).toUpperCase();
        document.getElementById('hex').value = hex;
        document.getElementById('preview').style.background = hex;
      }
      conv();
    
    </script>
