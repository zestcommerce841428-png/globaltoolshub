  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>URL Decoder</h1>
      <p>Decode a URL Encoded string back to normal text.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-2">URL Encoded</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64 font-mono" placeholder="hello%20world"></textarea></div>
        <div>
          <label class="block text-sm font-medium mb-2">Text</label><textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" readonly></textarea>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="try{document.getElementById('output').value=decodeURIComponent(document.getElementById('input').value)}catch(e){alert('Invalid Format')}">Decode</button>
        </div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
function process() { try { const lines = document.getElementById('input').value.split('
').filter(x=>x.trim()); const headers = lines[0].split(','); const res = lines.slice(1).map(l => { const vals = l.split(','); const obj = {}; headers.forEach((h,i) => obj[h.trim()] = vals[i] ? vals[i].trim() : ''); return obj; }); document.getElementById('output').value = JSON.stringify(res, null, 2); } catch(e) { document.getElementById('output').value = 'Invalid CSV'; } }
    
    </script>
