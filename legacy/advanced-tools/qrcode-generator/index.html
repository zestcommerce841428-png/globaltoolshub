<body data-bg="clean">
  <global-header></global-header>
  
  <main class="page-main">
    <h1>QR Code Generator</h1>
    <p>Create professional QR codes for text, URLs, contacts, and more. Download as PNG or SVG.</p>
    
    <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
      
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Input Section -->
        <div>
          <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Content</label>
            <textarea 
              id="input" 
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-32" 
              placeholder="Enter text, URL, or any content...">https://globaltoolshub.com</textarea>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium mb-2">Size (px)</label>
              <input 
                type="number" 
                id="size" 
                value="256" 
                min="128" 
                max="1024" 
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700"
              >
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Error Correction</label>
              <select 
                id="errorLevel" 
                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700"
              >
                <option value="L">Low (7%)</option>
                <option value="M" selected>Medium (15%)</option>
                <option value="Q">Quartile (25%)</option>
                <option value="H">High (30%)</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium mb-2">Foreground Color</label>
              <input 
                type="color" 
                id="fgColor" 
                value="#000000" 
                class="w-full h-12 rounded-xl border border-slate-300 cursor-pointer"
              >
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Background Color</label>
              <input 
                type="color" 
                id="bgColor" 
                value="#ffffff" 
                class="w-full h-12 rounded-xl border border-slate-300 cursor-pointer"
              >
            </div>
          </div>

          <div class="flex flex-wrap gap-4">
            <button 
              onclick="generateQR()" 
              class="btn-primary px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium shadow-lg transition-all"
            >
              Generate QR Code
            </button>
            <button 
              onclick="downloadQR('png')" 
              class="btn-secondary px-6 py-3 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-xl font-medium shadow-lg transition-all"
            >
              Download PNG
            </button>
            <button 
              onclick="downloadQR('svg')" 
              class="btn-secondary px-6 py-3 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-xl font-medium shadow-lg transition-all"
            >
              Download SVG
            </button>
          </div>
        </div>

        <!-- QR Code Display -->
        <div class="flex flex-col items-center justify-center">
          <div id="qrcode" class="p-8 bg-white rounded-xl shadow-lg border-2 border-slate-200"></div>
          <p class="mt-4 text-sm text-slate-600 dark:text-slate-400 text-center">
            Your QR code will appear here
          </p>

      </div>

      <div class="mt-8 p-6 bg-slate-50 dark:bg-slate-800 rounded-xl">
        <h2 class="text-xl font-semibold mb-4">Popular Use Cases</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button onclick="setExample('url')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">🔗 Website URL</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">Link to any website</div>
          </button>
          <button onclick="setExample('email')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">✉️ Email</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">Pre-filled email message</div>
          </button>
          <button onclick="setExample('phone')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">📞 Phone Number</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">Dial phone number</div>
          </button>
          <button onclick="setExample('sms')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">💬 SMS</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">Pre-filled SMS message</div>
          </button>
          <button onclick="setExample('wifi')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">📶 WiFi</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">WiFi credentials</div>
          </button>
          <button onclick="setExample('vcard')" class="text-left p-4 bg-white dark:bg-slate-900 rounded-lg hover:shadow-md transition-all">
            <div class="font-medium">👤 Contact Card</div>
            <div class="text-sm text-slate-600 dark:text-slate-400">vCard contact info</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
let qrcode = null;

function generateQR() {
  const input = document.getElementById('input').value;
  if (!input.trim()) {
    alert('Please enter content to generate QR code');
    return;
  }

  const size = parseInt(document.getElementById('size').value);
  const errorLevel = document.getElementById('errorLevel').value;
  const fgColor = document.getElementById('fgColor').value;
  const bgColor = document.getElementById('bgColor').value;

  // Clear previous QR code
  const container = document.getElementById('qrcode');
  container.innerHTML = '';

  // Generate new QR code
  qrcode = new QRCode(container, {
    text: input,
    width: size,
    height: size,
    colorDark: fgColor,
    colorLight: bgColor,
    correctLevel: QRCode.CorrectLevel[errorLevel]
  });
}

function downloadQR(format) {
  if (!qrcode) {
    alert('Please generate a QR code first');
    return;
  }

  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) {
    alert('QR code not ready yet');
    return;
  }

  if (format === 'png') {
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qrcode.png';
    a.click();
  } else if (format === 'svg') {
    // Convert canvas to SVG (basic implementation)
    const size = canvas.width;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, size, size);
    
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">`;
    const fgColor = document.getElementById('fgColor').value;
    const bgColor = document.getElementById('bgColor').value;
    
    svg += `<rect width="${size}" height="${size}" fill="${bgColor}"/>`;
    
    const pixelSize = 1;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const i = (y * size + x) * 4;
        const r = imageData.data[i];
        if (r < 128) { // Dark pixel
          svg += `<rect x="${x}" y="${y}" width="${pixelSize}" height="${pixelSize}" fill="${fgColor}"/>`;
        }
      }
    }
    
    svg += '</svg>';
    
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qrcode.svg';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function setExample(type) {
  const examples = {
    url: 'https://globaltoolshub.com',
    email: 'mailto:support@globaltoolshub.com?subject=Hello&body=Hi there!',
    phone: 'tel:+1234567890',
    sms: 'sms:+1234567890?body=Hello from QR code',
    wifi: 'WIFI:T:WPA;S:MyNetwork;P:MyPassword;;',
    vcard: `BEGIN:VCARD
VERSION:3.0
FN:John Doe
TEL:+1234567890
EMAIL:john@example.com
END:VCARD`
  };
  
  document.getElementById('input').value = examples[type];
  generateQR();
}

// Generate initial QR code on page load
window.addEventListener('load', () => {
  generateQR();
});
  </script>
