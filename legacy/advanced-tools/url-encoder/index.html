      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <script>
      
function process() { try { const data = JSON.parse(document.getElementById('input').value); const arr = Array.isArray(data) ? data : [data]; if(arr.length === 0) return document.getElementById('output').value = ''; const headers = Object.keys(arr[0]); const csv = [headers.join(',')].concat(arr.map(row => headers.map(h => JSON.stringify(row[h]||'')).join(','))).join('
'); document.getElementById('output').value = csv; } catch(e) { document.getElementById('output').value = 'Invalid JSON Array'; } }
    
    </script>
