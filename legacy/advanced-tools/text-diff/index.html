  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>Text Diff Checker</h1>
      <p>Compare two texts and find the differences. (Basic line comparison)</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <textarea id="t1" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-48" placeholder="Original text"></textarea>
        <textarea id="t2" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-48" placeholder="New text"></textarea>
      </div>
      <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="process()">Compare</button>
      <div id="res" class="mt-4 p-4 surface border border-slate-200 rounded-lg font-mono text-sm whitespace-pre-wrap"></div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>

function process() {
  const text1 = document.getElementById('text1').value.split('\n');
  const text2 = document.getElementById('text2').value.split('\n');
  let diff = '';
  const maxLines = Math.max(text1.length, text2.length);
  for(let i=0; i<maxLines; i++) {
    if(text1[i] !== text2[i]) {
      diff += 'Line ' + (i+1) + ':\n';
      if(text1[i]) diff += '- ' + text1[i] + '\n';
      if(text2[i]) diff += '+ ' + text2[i] + '\n';
    }
  }
  document.getElementById('output').value = diff || 'No differences found';
}
    </script>
