    <script>

function process() {
  const input = document.getElementById('input').value.trim();
  try {
    const url = new URL(input);
    document.getElementById('output').value = 
      'Protocol: ' + url.protocol + '\n' +
      'Host: ' + url.host + '\n' +
      'Hostname: ' + url.hostname + '\n' +
      'Port: ' + url.port + '\n' +
      'Pathname: ' + url.pathname + '\n' +
      'Search: ' + url.search + '\n' +
      'Hash: ' + url.hash;
  } catch(e) {
    alert('Invalid URL');
  }
}
