<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHA-512 Hash Generator - GlobalToolsHub</title>
    <meta name="description" content="Generate SHA-512 secure hash for any string.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>SHA-512 Hash Generator</h1>
      <p>Generate SHA-512 secure hash for any string.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-32" placeholder="Type here..." oninput="hash()"></textarea>
        <textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-32 font-mono text-sm break-all" readonly></textarea>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      async function hash() {
        const buf = await crypto.subtle.digest('SHA-512', new TextEncoder().encode(document.getElementById('input').value));
        document.getElementById('output').value = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      }
    
    </script>
  </body>
</html>
