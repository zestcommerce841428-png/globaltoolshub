<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMI Calculator - GlobalToolsHub</title>
    <meta name="description" content="Calculate your Body Mass Index.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>BMI Calculator</h1>
      <p>Calculate your Body Mass Index.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-sm mx-auto space-y-4">
        <div><label class="block text-sm font-medium mb-1">Weight (kg)</label><input type="number" id="w" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" value="70"></div>
        <div><label class="block text-sm font-medium mb-1">Height (cm)</label><input type="number" id="h" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner" value="175"></div>
        <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 w-full" onclick="calcBMI()">Calculate</button>
        <div id="res" class="text-center font-bold text-xl mt-4"></div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function calcBMI() {
        const w = parseFloat(document.getElementById('w').value);
        const h = parseFloat(document.getElementById('h').value)/100;
        if(w && h) {
          const bmi = (w/(h*h)).toFixed(1);
          let cat = 'Normal';
          if(bmi<18.5) cat = 'Underweight';
          else if(bmi>=25) cat = 'Overweight';
          document.getElementById('res').innerHTML = "BMI: " + bmi + " (" + cat + ")";
        }
      }
    
    </script>
  </body>
</html>
