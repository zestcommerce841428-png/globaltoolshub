<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON to CSV Converter - GlobalToolsHub</title>
    <meta name="description" content="Convert JSON array to CSV format instantly.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>JSON to CSV Converter</h1>
      <p>Convert JSON array to CSV format instantly.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-2">JSON</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64 font-mono" placeholder='[{"a":1,"b":2}]'></textarea></div>
        <div>
          <label class="block text-sm font-medium mb-2">CSV</label><textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64 font-mono text-sm" readonly></textarea>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="convert()">Convert to CSV</button>
        </div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function convert() {
        try {
          const arr = JSON.parse(document.getElementById('input').value);
          if(!Array.isArray(arr) || !arr.length) { document.getElementById('output').value = ""; return; }
          const headers = Object.keys(arr[0]);
          const csv = [
            headers.join(','),
            ...arr.map(obj => headers.map(h => JSON.stringify(obj[h]||'')).join(','))
          ].join('\n');
          document.getElementById('output').value = csv;
        } catch(e) { document.getElementById('output').value = "Error parsing JSON"; }
      }
    
    </script>
  </body>
</html>
