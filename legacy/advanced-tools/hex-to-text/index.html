  <body data-bg="clean">

      <h1>Hex to Text Converter</h1>
      <p>Convert hexadecimal strings into readable text.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium mb-2">Hex</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64 font-mono" placeholder="48 65 6c 6c 6f"></textarea></div>
        <div>
          <label class="block text-sm font-medium mb-2">Text</label><textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" readonly></textarea>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="process()">Convert</button>
        </div>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>

function process() {
  const input = document.getElementById('input').value.replace(/\s/g, '');
  try {
    document.getElementById('output').value = input.match(/.{1,2}/g)
      .map(hex => String.fromCharCode(parseInt(hex, 16))).join('');
  } catch(e) {
    alert('Invalid hex');
  }
}
    </script>
