<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HEX to RGB - GlobalToolsHub</title>
    <meta name="description" content="Convert hex color codes to RGB.">
    <link rel="stylesheet" href="../../assets/styles.css">
    <link rel="stylesheet" href="../../assets/site.css">
    <script src="../../assets/components.js" defer></script>
    <script src="../../assets/seo-runtime.js" defer></script>
    <script src="../../assets/app.js" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>HEX to RGB</h1>
      <p>Convert hex color codes to RGB.</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-sm mx-auto space-y-4 text-center">
        <input type="color" id="picker" class="w-24 h-24 mx-auto rounded-lg cursor-pointer" oninput="hex.value=this.value; conv()">
        <input type="text" id="hex" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono text-center uppercase" value="#4F46E5" oninput="picker.value=this.value; conv()">
        <input type="text" id="rgb" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner font-mono text-center" readonly>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function conv() {
        let h = document.getElementById('hex').value.replace('#', '');
        if(h.length === 3) h = h.split('').map(c=>c+c).join('');
        if(h.length === 6) {
          const r = parseInt(h.substring(0,2), 16);
          const g = parseInt(h.substring(2,4), 16);
          const b = parseInt(h.substring(4,6), 16);
          document.getElementById('rgb').value = "rgb(" + r + ", " + g + ", " + b + ")";
        }
      }
      conv();
    
    </script>
  </body>
</html>
