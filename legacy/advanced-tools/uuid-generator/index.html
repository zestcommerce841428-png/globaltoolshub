<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UUID v4 Generator - GlobalToolsHub</title>
    <meta name="description" content="Generate random UUIDs (Universally Unique Identifiers).">
    <link rel="stylesheet" href="../../../assets/styles.css?v=2">
    <link rel="stylesheet" href="../../../assets/site.css?v=2">
    <script src="../../../assets/components.js?v=2" defer></script>
    <script src="../../../assets/seo-runtime.js" defer></script>
    <script src="../../../assets/app.js?v=2" defer></script>
  </head>
  <body data-bg="clean">
    <global-header></global-header>
    <main class="page-main">
      <h1>UUID v4 Generator</h1>
      <p>Generate random UUIDs (Universally Unique Identifiers).</p>
      <div class="page-card surface rounded-2xl p-6 md:p-8 border border-slate-200 dark:border-slate-800 shadow-xl bg-white dark:bg-slate-900">
        
      <div class="max-w-md mx-auto text-center space-y-4">
        <input type="text" id="uuid" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner text-center font-mono text-lg" readonly>
        <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 w-full" onclick="genUUID()">Generate New UUID</button>
      </div>
    
      </div>
    </main>
    <global-footer></global-footer>
    <script>
      
      function genUUID() {
        document.getElementById('uuid').value = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }
      genUUID();
    
    </script>
  </body>
</html>
