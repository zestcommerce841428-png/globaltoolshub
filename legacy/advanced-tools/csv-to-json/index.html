        <div><label class="block text-sm font-medium mb-2">CSV</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" placeholder="a,b,c\n1,2,3"></textarea></div>

    <global-footer></global-footer>
    <script>

function process() {
  const input = document.getElementById('input').value.trim();
  const lines = input.split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const result = [];
  for(let i=1; i<lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, idx) => obj[h] = values[idx]);
    result.push(obj);
  }
  document.getElementById('output').value = JSON.stringify(result, null, 2);
}
    </script>
