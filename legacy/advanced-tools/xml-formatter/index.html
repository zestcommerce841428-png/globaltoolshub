      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div><label class="block mb-2">Input</label><textarea id="input" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" placeholder="Enter input here..."></textarea></div>
        <div>
          <label class="block mb-2">Output</label><textarea id="output" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all dark:bg-slate-900 dark:border-slate-700 shadow-inner h-64" readonly></textarea>
          <button class="inline-flex justify-center items-center py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 mt-4 w-full" onclick="process()">Process</button>

      </div>

    <global-footer></global-footer>
    <script>

function process() {
  const input = document.getElementById('input').value.trim();
  try {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(input, 'text/xml');
    const serializer = new XMLSerializer();
    const formatted = serializer.serializeToString(xmlDoc);
    document.getElementById('output').value = formatted
      .replace(/></g, '>\n<')
      .split('\n')
      .map((line, idx, arr) => {
        let indent = 0;
        if(idx > 0 && arr[idx-1].match(/<[^/][^>]*>$/)) indent++;
        if(line.match(/^<\//) && idx > 0) indent--;
        return '  '.repeat(Math.max(0, indent)) + line;
      })
      .join('\n');
  } catch(e) {
    alert('Invalid XML: ' + e.message);
  }
}
    </script>
