<div class="header"><h1>📝 Markdown Preview</h1><p>Live markdown editor with instant rendered preview</p></div>
<div class="grid"><div class="card"><label>Markdown Input</label><textarea id="md" oninput="render()" placeholder="# Hello World&#10;&#10;Write your **markdown** here...&#10;&#10;- Item 1&#10;- Item 2&#10;&#10;```js&#10;console.log('hello');&#10;```"></textarea></div><div class="card"><label>Preview</label><div id="preview"></div></div></div>
</div>
<script>
function render(){const md=document.getElementById('md').value;document.getElementById('preview').innerHTML=parseMd(md);}
function parseMd(md){let h=md
.replace(/^### (.*$)/gm,'<h3>$1</h3>').replace(/^## (.*$)/gm,'<h2>$1</h2>').replace(/^# (.*$)/gm,'<h1>$1</h1>')
.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>')
.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')
.replace(/~~(.*?)~~/g,'<del>$1</del>')
.replace(/`([^`]+)`/g,'<code>$1</code>')
.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
.replace(/!\[(.*?)\]\((.*?)\)/g,'<img src="$2" alt="$1">')
.replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>')
.replace(/^> (.*$)/gm,'<blockquote>$1</blockquote>')
.replace(/^---$/gm,'<hr>')
.replace(/^\- (.*$)/gm,'<li>$1</li>')
.replace(/^(\d+)\. (.*$)/gm,'<li>$2</li>');
h=h.replace(/(<li>.*<\/li>\n?)+/g,(m)=>'<ul>'+m+'</ul>');
h=h.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
return '<p>'+h+'</p>';
}
document.getElementById('md').value="# Welcome to Markdown Preview\n\nThis is a **live** markdown editor with *instant* preview.\n\n## Features\n- Bold, italic, strikethrough\n- Headers (h1-h3)\n- Code blocks with syntax\n- Links and images\n- Blockquotes\n- Lists\n\n> This is a blockquote\n\n```js\nconst greeting = 'Hello, World!';\nconsole.log(greeting);\n```\n\n---\n\nMade with ❤️ by [GlobalToolsHub](https://globaltoolshub.com)";
render();
</script></main>
