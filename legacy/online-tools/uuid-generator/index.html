<script>
function uuidv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
function generate(){
  const count = parseInt(document.getElementById('count').value)||10;
  const upper = document.getElementById('uppercase').checked;
  const hyphens = document.getElementById('hyphens').checked;
  let out = [];
  for(let i=0;i<count;i++){
    let u = uuidv4();
    if(upper) u = u.toUpperCase();
    if(!hyphens) u = u.replace(/-/g, '');
    out.push(u);
  }
  document.getElementById('output').value = out.join('\n');
}
generate();
function copy(){
const out=document.getElementById('output');out.select();document.execCommand('copy');

}
