<div class="header"><h1>📱 QR Code Generator</h1><p>Generate QR codes instantly from text or URLs.</p></div>

<label style="text-align:left">Text or URL</label>
<input type="text" id="text" placeholder="https://example.com" value="https://globaltoolshub.github.io" oninput="generate()">
<div class="qr-container" id="qrcode"></div>

<script>
var qrcode = new QRCode(document.getElementById("qrcode"), {
    text: document.getElementById('text').value,
    width: 256,
    height: 256,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
});
function generate(){
  var t = document.getElementById('text').value;
  if(t) {
    qrcode.clear();
    qrcode.makeCode(t);
  }
}
