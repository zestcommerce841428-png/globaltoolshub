<div class="header"><h1>🗜️ HTML Minifier</h1><p>Compress and minify your HTML code by removing unnecessary whitespace and comments.</p></div>
<div class="grid-2">
<div class="card">
<label>Input HTML</label>
<textarea id="input" placeholder="Paste your HTML here..."></textarea>
<div class="actions">
<button class="btn" onclick="minify()">Minify HTML ➡️</button>
<button class="btn btn-outline" onclick="document.getElementById('input').value='';document.getElementById('stats').style.display='none'">Clear</button>
</div>
</div>
<div class="card">
<label>Minified Output</label>
<textarea id="output" readonly placeholder="Minified result..."></textarea>
<div id="stats" class="stats"></div>
<div class="actions">
<button class="btn btn-outline" onclick="copy()">Copy Result</button>
</div>
</div>

<script>
function minify(){
  let html = document.getElementById('input').value;
  if(!html) return;
  const originalSize = html.length;
  html = html.replace(/<!--[\s\S]*?-->/g, '');
  html = html.replace(/>\s+</g, '><');
  html = html.trim();
  document.getElementById('output').value = html;
  const newSize = html.length;
  const saved = ((originalSize - newSize) / originalSize * 100).toFixed(2);
  const stats = document.getElementById('stats');
  stats.style.display = 'block';
  stats.innerHTML = `Original: ${originalSize} bytes | Minified: ${newSize} bytes | Saved: ${saved}%`;
}
function copy(){
const out=document.getElementById('output');out.select();document.execCommand('copy');
alert('Copied to clipboard!');
}
</script></main>
