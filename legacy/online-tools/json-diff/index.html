<main class="page-main shell py-8">
<div class="container">

<div class="header"><h1>📊 JSON Diff</h1><p>Compare two JSON objects side by side and see additions, deletions, and modifications</p></div>
<div class="grid-2">
<div class="card"><label>Original JSON</label><textarea id="j1" placeholder='{"name":"John","age":30,"city":"NYC"}'></textarea></div>
<div class="card"><label>Modified JSON</label><textarea id="j2" placeholder='{"name":"John","age":31,"country":"US"}'></textarea></div>
</div>
<div style="text-align:center;margin:16px 0"><button class="btn" onclick="diff()">Compare JSON</button></div>
<div id="stats" style="margin-bottom:12px"></div>
<div class="card" id="result" style="display:none"><label>Differences</label><div class="diff-out" id="out"></div></div>
</div>
<script>
function diff(){
try{
const a=JSON.parse(document.getElementById('j1').value);
const b=JSON.parse(document.getElementById('j2').value);
const changes=[];
function compare(o1,o2,path=''){
const keys=new Set([...Object.keys(o1),...Object.keys(o2)]);
for(const k of keys){
const p=path?path+'.'+k:k;
if(!(k in o1)){changes.push({type:'added',path:p,val:o2[k]});continue;}
if(!(k in o2)){changes.push({type:'removed',path:p,val:o1[k]});continue;}
if(typeof o1[k]==='object'&&o1[k]!==null&&typeof o2[k]==='object'&&o2[k]!==null&&!Array.isArray(o1[k])&&!Array.isArray(o2[k])){
compare(o1[k],o2[k],p);
}else if(JSON.stringify(o1[k])!==JSON.stringify(o2[k])){
changes.push({type:'changed',path:p,from:o1[k],to:o2[k]});
}}}
compare(a,b);
const added=changes.filter(c=>c.type==='added').length;
const removed=changes.filter(c=>c.type==='removed').length;
const changed=changes.filter(c=>c.type==='changed').length;
document.getElementById('stats').innerHTML=`<span class="stat" style="background:rgba(34,197,94,.15);color:#4ade80">+${added} added</span><span class="stat" style="background:rgba(239,68,68,.15);color:#f87171">-${removed} removed</span><span class="stat" style="background:rgba(245,158,11,.15);color:#fbbf24">~${changed} changed</span>`;
if(!changes.length){document.getElementById('out').innerHTML='✅ Both JSON objects are identical.';document.getElementById('result').style.display='block';return;}
let html='';
for(const c of changes){
if(c.type==='added')html+=`<span class="added">+ ${c.path}: ${JSON.stringify(c.val)}</span>\n`;
if(c.type==='removed')html+=`<span class="removed">- ${c.path}: ${JSON.stringify(c.val)}</span>\n`;
if(c.type==='changed')html+=`<span class="changed">~ ${c.path}: ${JSON.stringify(c.from)} → ${JSON.stringify(c.to)}</span>\n`;
}
document.getElementById('out').innerHTML=html;document.getElementById('result').style.display='block';
}catch(e){document.getElementById('out').innerHTML='❌ Invalid JSON: '+e.message;document.getElementById('result').style.display='block';}}
</script></main>
