<main class="page-main shell py-8">

<div class="header"><h1>🔄 Base64 Encoder / Decoder</h1><p>Encode plain text to Base64 format, or decode Base64 back to plain text.</p></div>
<div class="grid-2">
<div class="card">
<label>Input (Text or Base64)</label>
<textarea id="input" placeholder="Type or paste content here..."></textarea>
<div class="actions">
<button class="btn" onclick="encode()">Encode Base64 ➡️</button>
<button class="btn" onclick="decode()">Decode Base64 ➡️</button>
<button class="btn btn-outline" onclick="document.getElementById('input').value=''">Clear</button>
</div>
</div>
<div class="card">
<label>Result</label>
<textarea id="output" readonly placeholder="Result will appear here..."></textarea>
<div class="actions">
<button class="btn btn-outline" onclick="copy()">Copy Result</button>
</div>
</div>
</div>
</div>
<script>
function encode(){
const text=document.getElementById('input').value;
try{document.getElementById('output').value=btoa(unescape(encodeURIComponent(text)))}catch(e){document.getElementById('output').value='Error encoding text.'}
}
function decode(){
const text=document.getElementById('input').value;
try{document.getElementById('output').value=decodeURIComponent(escape(atob(text)))}catch(e){document.getElementById('output').value='Invalid Base64 string.'}
}
function copy(){
const out=document.getElementById('output');out.select();document.execCommand('copy');
alert('Copied to clipboard!');
}
</script></main>
