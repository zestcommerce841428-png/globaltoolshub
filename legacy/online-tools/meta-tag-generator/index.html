<main class="page-main shell py-8">
<div class="container">

<div class="header"><h1>🏷️ Meta Tag Generator</h1><p>Generate complete SEO meta tags, Open Graph, Twitter Card, and JSON-LD structured data</p></div>
<div class="card">
<div class="grid-2">
<div><label>Page Title</label><input id="title" placeholder="My Amazing Website" oninput="gen()"></div>
<div><label>URL</label><input id="url" placeholder="https://example.com" oninput="gen()"></div>
</div>
<label>Description (150-160 chars)</label><textarea id="desc" rows="2" placeholder="A brief description of your page..." oninput="gen()"></textarea>
<div class="grid-2">
<div><label>Author</label><input id="author" placeholder="John Doe" oninput="gen()"></div>
<div><label>Keywords</label><input id="keywords" placeholder="web, tools, seo" oninput="gen()"></div>
</div>
<div class="grid-2">
<div><label>OG Image URL</label><input id="image" placeholder="https://example.com/image.png" oninput="gen()"></div>
<div><label>Site Name</label><input id="sitename" placeholder="My Site" oninput="gen()"></div>
</div>
<div class="grid-2">
<div><label>Twitter Handle</label><input id="twitter" placeholder="@myhandle" oninput="gen()"></div>
<div><label>Language</label><select id="lang" onchange="gen()"><option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option><option value="de">German</option><option value="hi">Hindi</option><option value="ar">Arabic</option><option value="zh">Chinese</option><option value="ja">Japanese</option></select></div>
</div>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><label style="margin:0">Generated HTML</label><button class="btn" onclick="copy()">📋 Copy</button></div>
<div class="code" id="out"></div>
</div>
</div>
<div id="toast">✅ Copied!</div>
<script>
function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gen(){
const t=document.getElementById('title').value||'';const u=document.getElementById('url').value||'';const d=document.getElementById('desc').value||'';
const a=document.getElementById('author').value||'';const k=document.getElementById('keywords').value||'';const i=document.getElementById('image').value||'';
const s=document.getElementById('sitename').value||'';const tw=document.getElementById('twitter').value||'';const l=document.getElementById('lang').value;
let h=`&lt;!-- Primary Meta Tags --&gt;\n&lt;title&gt;${esc(t)}&lt;/title&gt;\n&lt;meta name="description" content="${esc(d)}"&gt;\n&lt;meta name="keywords" content="${esc(k)}"&gt;\n`;
if(a)h+=`&lt;meta name="author" content="${esc(a)}"&gt;\n`;
h+=`&lt;meta name="robots" content="index, follow"&gt;\n&lt;meta name="language" content="${l}"&gt;\n&lt;link rel="canonical" href="${esc(u)}"&gt;\n`;
h+=`\n&lt;!-- Open Graph / Facebook --&gt;\n&lt;meta property="og:type" content="website"&gt;\n&lt;meta property="og:url" content="${esc(u)}"&gt;\n&lt;meta property="og:title" content="${esc(t)}"&gt;\n&lt;meta property="og:description" content="${esc(d)}"&gt;\n`;
if(i)h+=`&lt;meta property="og:image" content="${esc(i)}"&gt;\n`;
if(s)h+=`&lt;meta property="og:site_name" content="${esc(s)}"&gt;\n`;
h+=`\n&lt;!-- Twitter Card --&gt;\n&lt;meta name="twitter:card" content="summary_large_image"&gt;\n&lt;meta name="twitter:title" content="${esc(t)}"&gt;\n&lt;meta name="twitter:description" content="${esc(d)}"&gt;\n`;
if(i)h+=`&lt;meta name="twitter:image" content="${esc(i)}"&gt;\n`;
if(tw)h+=`&lt;meta name="twitter:site" content="${esc(tw)}"&gt;\n`;
h+=`\n&lt;!-- JSON-LD Structured Data --&gt;\n&lt;script type="application/ld+json"&gt;\n${JSON.stringify({"@context":"https://schema.org","@type":"WebPage",name:t,url:u,description:d,author:{"@type":"Person",name:a||"Author"},image:i||undefined},null,2)}\n&lt;/script&gt;`;
document.getElementById('out').innerHTML=h;
}
function copy(){const t=document.getElementById('out').textContent;navigator.clipboard.writeText(t).then(()=>{const el=document.getElementById('toast');el.style.display='block';setTimeout(()=>el.style.display='none',2000)});}
gen();
</script></main>
