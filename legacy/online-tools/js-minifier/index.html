<main class="page-main shell py-8">
<div class="container">

<div class="header"><h1>⚡ JS Minifier</h1><p>Compress your JavaScript code for optimal performance.</p></div>
<div class="grid-2">
<div class="card">
<label>Input JS</label>
<textarea id="input" placeholder="Paste your JS here..."></textarea>
<div class="actions">
<button class="btn" onclick="minify()">Minify JS ➡️</button>
<button class="btn btn-outline" onclick="document.getElementById('input').value='';document.getElementById('stats').style.display='none'">Clear</button>
</div>

<label>Minified Output</label>
<textarea id="output" readonly placeholder="Minified result..."></textarea>

<button class="btn btn-outline" onclick="copy()">Copy Result</button>

<script>
function minify(){
  let js = document.getElementById('input').value;
  if(!js) return;
  const originalSize = js.length;
  js = js.replace(/\/\*[\s\S]*?\*\//g, '');
  js = js.replace(/\/\/[^\n]*\n/g, '\n');
  js = js.replace(/\s+/g, ' ');
  js = js.replace(/\s*([=+\-*/<>(){}\[\];,:])\s*/g, '$1');
  js = js.trim();
  document.getElementById('output').value = js;
  const newSize = js.length;
  const saved = ((originalSize - newSize) / originalSize * 100).toFixed(2);
  const stats = document.getElementById('stats');
  stats.style.display = 'block';
  stats.innerHTML = `Original: ${originalSize} bytes | Minified: ${newSize} bytes | Saved: ${saved}%`;
}
function copy(){
const out=document.getElementById('output');out.select();document.execCommand('copy');
alert('Copied to clipboard!');
}
</script></main>
