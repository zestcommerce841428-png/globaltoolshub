<main class="page-main shell py-8">
<div class="container">

<div class="header"><h1>🔑 JWT Decoder</h1><p>Decode and inspect JSON Web Tokens. View header, payload, signature & expiry status.</p></div>
<div class="card">
<label>Paste JWT Token</label>
<textarea id="jwt" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6Ikdsb2JhbFRvb2xzSHViIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"></textarea>
<div style="margin-top:12px;display:flex;gap:8px"><button class="btn" onclick="decode()">Decode JWT</button><button class="btn btn-outline" onclick="document.getElementById('jwt').value='';document.getElementById('out').innerHTML=''">Clear</button></div>
</div>
<div id="out"></div>
</div>
<script>
function b64decode(s){try{return JSON.parse(atob(s.replace(/-/g,'+').replace(/_/g,'/')))}catch{return null}}
function decode(){
const t=document.getElementById('jwt').value.trim();if(!t)return;
const parts=t.split('.');
if(parts.length!==3){document.getElementById('out').innerHTML='<div class="card"><span class="badge badge-err">Invalid JWT — must have 3 parts separated by dots</span></div>';return;}
const header=b64decode(parts[0]);const payload=b64decode(parts[1]);
let expInfo='';
if(payload&&payload.exp){const d=new Date(payload.exp*1000);const now=new Date();const expired=now>d;
expInfo=`<div class="info-row"><span class="badge ${expired?'badge-err':'badge-ok'}">${expired?'EXPIRED':'VALID'}</span><span class="badge badge-warn">Expires: ${d.toLocaleString()}</span></div>`;}
if(payload&&payload.iat){const d=new Date(payload.iat*1000);expInfo+=`<div class="info-row"><span class="badge badge-ok">Issued: ${d.toLocaleString()}</span></div>`;}
if(payload&&payload.nbf){const d=new Date(payload.nbf*1000);expInfo+=`<div class="info-row"><span class="badge badge-warn">Not Before: ${d.toLocaleString()}</span></div>`;}
document.getElementById('out').innerHTML=`
<div class="card"><label>Token Info</label>${expInfo}
<div class="info-row"><span class="badge badge-ok">Algorithm: ${header?.alg||'N/A'}</span><span class="badge badge-ok">Type: ${header?.typ||'N/A'}</span></div></div>
<div class="grid grid-2">
<div class="card"><div class="part"><h3>Header</h3><pre>${header?JSON.stringify(header,null,2):'Invalid header'}</pre></div></div>
<div class="card"><div class="part"><h3>Payload</h3><pre>${payload?JSON.stringify(payload,null,2):'Invalid payload'}</pre></div></div>
</div>
<div class="card"><div class="part"><h3>Signature (Base64URL)</h3><pre>${parts[2]}</pre></div></div>`;
}
</script></main>
